body:
  text: 顔山雜記地理類八雜記之屬提要臣等謹案顔山雜記四卷國朝孫廷銓撰廷銓字伯度又字枚先號沚亭益都人前明崇禎庚辰進士入國朝以薦授河南府推官擢吏部主事歷官內祕書院大學士諡文定益都有顔神鎮形勢險厄明代嘗建城郭設官以治之廷銓世居其地康熙丙午廷銓以大學士豫告在籍因搜輯舊聞作為此書分山谷水泉城市官署鄉校逸民孝義風土嵗時長城考靈泉廟災祥物變物産物異遺文諸目敘次簡核而造語務求雋異王士禎居易録稱田雯黔書七十六篇有似爾雅者有似考工記者有似公榖檀弓者有似越絶書者故相孫文定公廷銓作顔山雜記山蠶琉璃窰器煤井鐵冶等文筆竒峭亦如此云云今考琉璃窰器煤井鐵冶俱此書所載其山蠶一條則在廷銓南征記略中士禎蓋偶然誤記又士禎香祖筆記引此書所載鳳皇嶺玉皇宫石刻宋太祖太宗真宗御押與周密癸辛雜識所載不同云並載以備參考案癸辛雜識為明代重刋此石為宋代原刻木板易訛當以碑本為據士禎兩存亦非也惟香祖筆記又據黃瓚雪洲集議礦盜一疏謂顔神設官之議起于瓚而駁此書正德十二年巡按黃某奏請之説為非是則誠廷銓考核之疏矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀序孝水之為鄉於縣最僻逺而山川清麗民風朴願城之者王先生元美記之者李先生于鱗于鱗之文頗竒偉而地與事皆不甚切實蓋李生平與王最深其為文特欲侈大之已耳固未嘗身至其地而詳考其父老子弟也然王公之城孝水也襟阜帶溪向背得所髙岫霞蒸清泉脈錯自是百年以來民生日繁人文日興變亂之後巋然獨完其功豈可忘哉李所為文蓋於王為不誣而於孝鄉則少疏矣城東秋谷魏别駕祠有馮文敏鍾司空二公碑文亦雅健可喜其於風土交涉頗狹豫少年稍知讀書每悵然有感夫境地必待人而顯而人之文辭非工弗傳故勝區名作常患不相值若幸得之而言之失真考之不詳亦猶之乎不相值而已相國沚亭孫公往與豫共硯席亦懷此歎今垂三十年矣兹公以謝病暫歸里居多暇因成顔山雜記四卷寄以示豫豫讀之簡而有法潔而多姿上追考工爾雅下亦不失應劭酈道元其文之工足以傳逺而其實則父老子弟所終日耳而目之里巷誦説無異物無異辭也昔云元氣之融結為山川而山川之竒莫不有所鍾以自見孝水之受名舊矣自王先生城之又且百餘年傳記所載碑版所垂非不衆多也而工且信者不假於異邦之人而卒出於公則吾孝鄉之山川誠亦靈矣哉趙進美題序余幼讀書談鄉里事嘗有二疑一龍圖范老本吳人嘗守青州青州至今傳范井固也何顔城僻在深山乃亦有范泉將無影響又陳仲子者既隱處於陵皇甫謐髙士傳及劉孝標世説新語注又有適楚見聘之文且賴妻言而止以仲子窮餓又動與妻俱意楚國逺矣安從得車糧資此逺舉後讀宋史乃知仲淹少長於長山及舉進士第一猶名朱説舊讀書長白山而此泉亦其寄迹非宦迹也又讀春秋傳魯成公九年而楚入渠丘後竟滅莒又滅魯直與齊接今顔山上古長城乃齊楚之防塞去於陵百里耳當仲子世魯雖未滅意楚人狡焉啓疆逼齊已甚即逺不過二三百里耳因歎人不讀書見聞寡陋以視天下事固鮮不影響者也甲辰冬余病罷官兀兀歸卧以山居少纍遲之越歲目漸能視腕漸能書屬長夏無事兼所居近山松下多風亦不甚暑聊疏鄉里間事以遣懷或一日間日三數日輒得一條手自録之數月遂成卷帙因題曰顔山雜記以示友人蒙曰是當為顔城作志余曰志家文繁而不殺蓋細大畢舉皆須有義例兹余所記特里巷細言紀近不能及逺矧嚮者諸鄉先輩郡有志邑有志志邑而鄉舉矣安用枝指為曰然則不失為荆楚歲時記華陽人物志耶余曰彼子虛三都之舊俶詭瑰麗筆不勝書兹顔城三里山郭耳競為其書恐亦不得也沚園灌長識
