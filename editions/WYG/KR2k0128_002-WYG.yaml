body:
  text: 顔山雜記卷二秘書院大學士孫廷銓撰鄉校聞之先正之言曰先王之興文治非獨長養賢能以隂消天下之跋扈而去其怒也故五尺之童入塾知敬杯酒之聚無禮必譁庠序之教顧不重哉及其敝也士氣浮薄莠言日進使秦人遷怒於詩書而一炬盡之又厲禁焉卒之民氣飛揚教猱升木其禍旋自中之乃更速於游談而詩書固至今存也故禮教雖薄勝於無禮學術雖敝善於無學何也璆然充盛者甲兵之色也温文遜志者俎豆之容也今試與建羽旄擐甲胄千夫决拾鼓角而起雖仁者於此奮焉有殺人之心矣試與列絃歌陳詩史講席在前更老在右雖勇者於此油然有安禮之志矣若是者何也勢固使然雖其衰敝勿可廢也鎮之學宫莫詳其始宋元嘗設山長以主守之蓋僅矣明嘉靖間通判羅賢增修式廓自是春秋釋菜品式備具諸士皆從禮俗寖昌文學興起世有顯者矣按石馬村古佛院元世祖至元二十五年碑刻是益都縣顔神教諭鄭琥書恐即當時山長也今廟中明碑乃云此廟之設創于元統三年元統是順帝最初年號豈學官已設于元初而學宫顧遲于元末耶且元統紀號止厯二年嗣即復襲世祖故號改元至元又並無元統三年也其説訛誤不足徵今不載趙汝弼字闕嘉靖癸夘鄉科趙敬簡號龍泉嘉靖丙午鄉試第闕名鞏昌府通判趙敬賓字玉臺敬簡弟嘉靖戊午鄉科宿遷知縣李時華字還青萬厯癸酉鄉科趙爾待字需齋敬簡子萬厯癸酉鄉試第四名金華府推官李時輝字惟青時華弟萬厯戊子鄉科己丑進士西安府推官兵部主事復降大同府推官邑人通政曹璜有傳秃翁李贄焚書有答李惟青書欒行言字訥菴萬厯乙酉鄉科霍丘知縣劉若虚字惺源萬厯辛夘鄉科張曉字明衡萬厯庚子鄉試第二名丁未進士兵部尚書總督宣大趙振業字塈垣萬厯戊午鄉科天啟乙丑進士御史巡漕江南督學江南副使晉階參政王𢎞化字懷麓萬厯戊午鄉科茶陵知州張聯軫字朗生曉子天啟甲子鄉試第三名孫景昌字羲侣崇禎癸酉鄉科庚辰進士南昌知縣有傳在别集劉龍光字昆禄崇禎丙子鄉試第四名丁丑進士行人趙進美字韞退振業子崇禎丙子解元時年十七歳庚辰進士給事中叅政孫廷銓字伯度崇禎己夘鄉科庚辰進士大學士孫廷鐸字道宣崇禎壬午鄉科趙班璽字受介爾待曾孫順治乙酉鄉試第四名丙戌進士御史巡按四川山西張聯箕字即公曉子聯軫弟順治戊子鄉科乙未進士鄉寧知縣張之翰字平侯暁孫順治辛夘鄉試第二名時年十六歳李融和字介昭順治庚子鄉科吕維檊字仲英康熙癸夘鄉科丁未進士按益都縣孝婦鄉編户二十一社鎮城附郭八社耳右所集錄悉附郭人外如列卿記所載王讓字宗禮幼有孝行嘗廬墓致湧泉之應洪武末由鄉薦授國子學錄永樂中簡侍皇太孫讀書讓在講筵首陳堯舜之道惟在孝弟人主躬行孝弟則天下感化不勞而治每談經必端凝拱立敷宣明暢太孫敬而愛之時同事之臣陳山張瑛以順㫖被寵戴綸林長懋則强諫不少詭隨惟讓謙黙寡言每進規諷亦委曲切中事情太孫斂容聽之及扈從北行常被召見適甘泉教諭張昱東阿教諭韓岫永年教諭劉順皆被簡擢為國子博士侍皇太孫讀書讓雖先進以官序折節下之意恬如也洪熙初太孫正位東宫進左春坊庶子未幾東宫即位是為宣宗以傅導功陞讓吏部右侍郎綸等皆居其次時同官黄宗載負才尚氣讓每懷退遜遂交好日密在部二年因浙江秋租負欠積多命讓督理未幾卒時七十四讓言若不出口而持身素履人所不及洊歴榮顯恭儉若布衣時為上簡注未嘗矜耀忠亮清介始終如一孝鄉八陡社人也又郡志列鄭光溥號一山嘉靖丁酉以選貢舉北京解元戊戌進士除行人歴陞山西提學僉事贍通五經先行後藝西士向風孝鄉原泉社人也翟鳯翀字凌𤣥萬厯甲辰進士知任丘擢御史以中涓漸作威福主權慮有旁落抗疏指斥吕貴冉登等且曰陛下一切政令批發雖曰親裁獨斷實非公聽並觀大臣造膝無從小臣叫閽不應所當前而善為逢迎者皆宦寺也叅嗔喜而居其㑹巧隂陽以行其私相引相煽轉伺轉工請乞差遣之命至不逾時而用人行政偏以閡隔釀叢脞之階折檻批鱗之士或傅重辟而元惡大憝反以夤縁生出脱之路營惑屢售浸假遂開如吕貴冉登凌應登之事旬日間迭見告矣天髙難問長此安窮臣憂其終故怖其始後至天啟間卒如其言遂退居不出及魏璫敗起兵部侍郎天津巡撫孝鄉西河社人也皆以村居稍逺未敢叙列餘尚多人悉如此例灌長氏曰余自童丱時常遊鄉校見堂下喬木皆大于車輪後學徒不戒失火延燒而泮池銀杏扶疎交䕃猶至今存思人愛樹繫人已深況近聖人之居乎學宫之側故有郵亭歳久摧敝鞠為茂草别駕葉君先登取其廢地闢為講堂以益學宫欲與諸士讀書講藝其中其事未就遽已罷去而亦非其罪也惜哉逸民夫風俗之盛豈不闗教化哉彼匹夫一節之行固不出於鄉閭而詩咏徧徳書稱從欲動闗主極若此者以醇龎近古一以見教化之行一以見王澤之久茍其隱約而型世小人之澤固亦猶夫君子也彼汝南先賢益部耆舊去古人已遠讀其書猶想見其時況三五之際乎孝鄉僻陋在山中而隆萬以前風俗龎固賢行髙致時在諸生布衣間於今亦少微矣夫公慚卿卿慚長自昔歎之觀世者寧無惄於中乎聊論次其傳志嚮往焉李封公寶字魯峯少以力聞長更折節教諸子以儒學顯而自隱居藥籠間人慕其樂易所居輙倍售同業皆不及又卜别業孝水之濱種植竹樹蓄琴酒狎漁樵以自娛子時輝舉進士有學行實為孝鄉之倡魯峯嘗有句手香丸藥後心靜理琴餘又題竹詩主人愛竹比琅玕幾度栽培幾度看今已枝枝成大節直將斫作釣鼇竿聞之其孫篤云張南野先生名堯封先世稱白馬張氏先生移家傍學宫自幼習於禮容俎豆被服造次必於儒者教四子皆為莊士家法醇謹不得輕是非人物即對門生後進詞色温温其言若訥其行若俯不敢以齒徳加人至人有急難空乏望門投止則解衣推食若將不及臨行贈餞即家無有常假貸與之叔子明衡公既貴乃折劵焉趙貢士祜自號玉沙性簡淡讀書深黙甚有檢裁父應時嘗以貢士為蘭陽主簿家故淡薄祜又躭讀不措意生産愈益貧落或至齋時已過妻孥尚懸釡以待有不堪者輙顧笑曰姑徐徐無妨我讀也居常晏坐一室冬夏不謝衣冠萭歩徐行意閒閒既無惰容亦無窘歩以此人未或窺其際焉晩好青鳥之言雖已䇿名閉户不仕追摹伏讀著地理紫囊書若干卷寒夜手錄凡三易藁而成邑人兵部尚書邢玠為序而傳之世多有其書兹不論欒翁誥余鄉布衣也幼頴俊喜讀書更能强記人有試之者窺翁一覽之書謬摘一二事以為談柄翁即揭其本末源源不竭顧性端慤不趨時閒居肆志竟絶意於功名登山臨水搖膝吟咏以此自樂萬厯丙申歳忽思壯遊遂度鴈門登五臺翺翔闗塞時疆吏漸已惰窳每遇風物蕭條銅鐎夜起輙興歎咤賦物流連以攄其磊砢落拓之氣迨歸積詩滿册置巾箱中六十年無知之者其孫珽偶檢廢簏得之乃付梓余弟保安令廷錫為論定之余讀集中如宸居工靜攝宰府喜相傾地利猥云盡天階敢謂平此雖庶人之議實當時實録藥言而惜乎君相之不聞也間錄如左金雀屏金雀非凡鳥如何數更多三春飛不去終日戀青柯似有諷意五臺山勢聳天原近雲連禪院孤雪山迎客凍寒月照僧疎石影虛空住溪聲􅆊誦無禪那真妙相不數輞川圖奉和撫軍魏公與劉靜老飲于部署秋色看將盡歸圖尚未成不嫌杯酒淡重與故人傾近塞寒常早憂時氣未平鴈門如潁上應奏徳星明塞上稀知已夫君有素心自公時一過追往意何深月落燈為續秋涼杯可任白頭人已倦多事未投簮和鴈門晩眺絶塞溪聲不斷流空山落木報髙秋邊庭火息征人喜邸閣寒生旅客愁千里孤臣懷北闕數行歸鴈過南樓天涯知己誰同在不擬人間説壯遊曾大父栁溪公諱延壽故處士也家世朴魯曾大父獨信嚮儒術小子六歳就塾師于孝感里舎時侍曾大父起居每見鄰父三數老翁來就曾大父笑言數數有所稱説或復相太息又時探篋發籌筴共布算事竟還納封之間治壺榼攜與俱去小子方䝉昧意不辨也曾大父先故有石田悉已付兩大父所居惟堂一寢一餘屋八九間僕婢才給灑掃晨起檢料畢即還視罏座工人罏座者余家自洪武垜籍所領内官監青簾世業也維國家營建郊壇饗殿則執治其櫺扉簾幌之事而鱗次之琉璃晶映上徹罘罳義取乎青象穹蒼答𤣥貺也𨽻籍内廷班匠事焉故世執之也過是則復退簷下其前鄰父笑言啞啞矣一日小子顧見所居堂楣梁間有䝉茸塵封者以問諸父曰彼卷然者何也曰文軸也盍張焉曰敝矣敝則曷用藏之曰昔我翁有髙義為鄉里盛推有贈言焉誼不可廢也其髙義奈何曰昔髙苑南鄙人有販硝于我里者既得貲納槖裝矣俄而過市而逸其驢以喪其槖突入乎吾家我翁發之見爛然貲也緘縢以待徐招其人而還之寶則其寶也而驢腹加果矣其人慕此髙義歸治贈言返頌謝焉至今猶曰孫如竹者其人也我翁以謂人茍有一善未嘗不重于鄉將以教示吾曹故雖敝不可廢也曾大父儀容豐頎廣顙疎眉鬑鬑有鬚然畢皤矣年及杖置鳩杖一然不時杖也小子稍益大以身為杖曾大父杖焉時杖杖時杖小子負劒辟咡匍匐奉履綦以足受之意欣欣色煦煦也時及弟鍾更迭互進小子進所得果餌必令分遺弟弟進亦令以遺小子且撫之曰我教若兩祖力學垂四十年鄉里謂且置我輿上日可期也今不能辦馬耶命也夫吾老矣時小子漸有心知感其言乃憶諸父老簷下共語時數數稱説者乃謂孫氏敦龎好禮能事詩書行大其世且説書史道故舊為娛樂也其太息者憂時念亂謂兒曹行見此也其探筴布算還復納之者相與醵金為賙給寡乏婚葬資出入服息必歸其餘簿録之也其壺榼俱去者為人排難解紛或里中有報賽當往為祭酒也是皆老而無倦矣曾大父善歗歌歡至而歌樂也融融每以歳七月初度置酒北堂兩大父洗斚奉觴諸父薦盤飱小子輩授几布席曾大父顧而樂之賓至離席降阼階攝齊從事拜獻即席金奏作鼓一再行無算爵賓主雝雝成禮而退賓乃顧曰樂哉衣冠之會四世一堂歌斯咏斯聚族於斯自里中諸大姓未有此也以是熙熙為八十年太平人物卒後十五年子孫遂以次顯李布衣時白字嘿菴為人爽朗善談吐嘗遊公卿間意邁往不屑山水禽魚襟琅琅也性好詞令兼善丹竈頗量情惜福不以侈汰為豪每閉户丹成出以示人不過銖兩取足以給壺餐具雞黍而已曰吾福薄不敢以多財賈禍也余嘗讀嘿菴詞令二卷音調每有未叶然當其意得瀟灑閒曠如鶴唳霜臯鳩啼春晝如月圓月缺一時霎不識江山也折倒的有形骸没話説百年身千年調誰是豪傑天生下李侈奢輕財那管燈明滅世不學假惺惺心似鐵他怎知酒杯寒再斟重熱休笑俺酒泉竭氣分折吟成愛向楓林寫醉懶從他竹徑欹閒情只共沙鷗説澹人營業衷腸話説的來寧貼假做真到底成寃孽隨邪事從來不徹閙炒炒苦調甜急忙忙悲攪樂亂紛紛巧弄拙你看我紅梅緑竹堂白酒黄雞社但逢塲耍些杜甫曲江春浩然驢背雪庾亮樓頭月風光到處閒何必逢佳節休等待人情問者知那日覺醒來急囘頭晩了也孫志武字景烈本江都人少年避仇來孝水樂此土遂土著為人瀟爽喜讀書善談議潑墨作梅竹皆疎挺有生氣既入庠為益都諸生教授生徒來者日衆乃於屋後起小亭子棐几竹榻怪石花藥即事為工有籬菊悠然之意每晨興升講席諸生長幼各以班處危坐横經抗聲講義四座悄然稍倦輙掩卷説他事及古今人物雜以笑謔聽者粲然為之解頥破顔殆忘其煩乃整襟復講以此人人自得如對友朋之樂學日進而不自知其故也既罷退入竹亭散髮偃仰具香茗客至則讌談終日諸生即有疑難轉相教説人盡其意亦不復數數進溷先生也後徙居顔泉東墅年已八十尚日夕勤勵引燭鈔書纎纎作細字或步􅓏顔泉之上吟風弄月以歸不知老之將至焉翟徵君良字玉華弱冠聰悟有思理從父宦遊武昌嬰弱疾劇甚會遇明醫數月得差從此刻意方書窮治㝠緬如是七年轉得綂緒既盡發古人之奥府又能以意叅互用之及歸為諸生方治博士家言而其好方書日益甚鄉里友朋或病者時一投藥試之並輙間可已而小試小效大試大效不復能自避閟輪蹄童叟日集門庭所活人不可量數矣順治戊子徵書下撫軍撫軍下郡縣守令到門勸為之駕趣乘傳詣京師既至館于光禄署酒醴餼牽大官朝夕供張甚厚又數召入禁門皆適以他故中休未得輙賜燕見會有心害其能居數月罷去年七十餘歎曰醫小道也後生不敏或束書不讀或復讀之不能通其意將以救人之為適足殺人者蓋多多矣乃綜輯舊聞辨其同異摘其謬誤著其機要其未發者間以己意疏演並論次之著書數編曰脈訣彚編經絡彚編藥性對搭本草古方講意痘科編余嘗為刋行之嘗有病家患閉秘者延醫數輩來皆不效乃迎翁至按其前方曰我知之矣乃取提氣一藥倍投之諸醫皆相顧笑翁曰第觀之方就食藥熟以進食未既主人報曰可矣一座盡驚乃謝曰此病氣不下行也我輩力下之猶不得令反提其氣而效若是此何理也翁曰諸君獨不見含水葫蘆乎滿而不瀉者止有一孔氣不得通故也今吾上通其氣而下自行此自常理顧諸君不察耳衆乃服其生平持論通亮如此附孝義三人冷茂才日升龍州扶櫬記曰先君諱植元字養冲性好遊東渉髙句麗西窮哈密山川風土人物歴歴可指掌談也又數遊嶺南己夘歳攜仲子日晟而南兵火翺翔滄桑代謝長往異域生死昧如己廿餘年矣己丑歳洋舶飄入浙東風傳多中華人不孝隨督學翟于園先生以往歴訪年餘罔有踪迹乃歸又數歳適韞退趙先生擢嶺西大叅不孝間闗俱往遇鄉里喬君際㝢將客遊粤西不孝忽心動長跽泣涕託之訪求意亦不敢知也會韞退先生將齎捧入賀于京苦無所依往返閲歳輙與俱北再至端州而喬君自粤西來微聞先君旅櫬消息似在龍州不孝乞韞退先生移文左江道且具扁舟相送端州至龍州五千餘里溯牂牁而上灘險凡三百七十有竒其最者如蒼梧之長洲滚龍南平之崆巄銅鼓潯州之龍門虎跳南寧之火燄烏蠻太平之羊尾魚影波勢怒號危石側立舟蟻貫其中稍失尺寸立成虀粉雖長年篙師至此無不惴惴色變呼籲神明以求須臾之濟路出石門日亭午舟子牽挽間虎出叢薄搏一人而去其舟與人虎相牽絆幾俱廢柁師斧斷之得免至鹿村大風壞舟進退無䇿仰天而號忽有乘風揚帆而來者急呼求救至則豫章劉基臣韞退先生端州幕中所晤客也握手相慰遂附之同舟過横州永淳其地多盜艇日夜行刼往來裹足及達南寧則左江道已去任窘甚謀之基臣即以嶺西之移陳情于南寧太守虞公慨然移書于思明府郡丞左右之蓋以土屬皆所統轄也再逾壺城則無復中華人矣男婦形狀侏􅍣語言文字不通無可奈何適遇廬陵彭翔如者際㝢疇昔交也往來于此歳月滋久深得彼中風俗語言際㝢嘗以先君之事寄託之恰自明江下䭾棉不期而遇信宿商畧俱返龍州際㝢之于先人計至矣又有鹺客王姓者傳不孝仲弟晟寄寓遷隆地近分茅嶺即古銅柱界也岐路彷徨艤宿不眠中夜嗚咽鄰舟有亷君石玉者聞之問故遂贈言削牘與其朋好明江任玉書加意區畫其人任俠諸土司所信服也又有同鄉許君鳯山徳平人避地于此哀不孝事毅然佐之同往明江思明當事因玉書䕶導甚備遷隆去思明又二百餘里中道阻水風雨驟至昏如深夜人不相見幾于飄沒既至晉會司官情極悃窽且曰予龍州甥也總角時往來外家見有客傾倒座上予戲其旁舉座盛稱之曰此冷先生也今丰度尚可記憶若有子客寓于予峒屬予必知之因聚各鄉榔頭詢查僉曰未有始知䭾棉鹺客之傳多訛闕矣于是乘舟順流急還明江復因玉書集明江之耆艾問之有那利蔡鄭二客年皆髦矣舊客龍州嘗與先君邂逅近以避亂徙居聞不孝之請扶杖偕往由此之龍州路經滑石灘適與葬師譚先生遇蔡叟曰事有緒矣譚即太翁忘形交也要與俱至甫停舟鄭叟引不孝至北門交帶橋遙指曰太翁佳城當在此中矣太翁客此時與土官出遊周覽指㸃歎賞後聞舉以相贈某依稀記之及至其處荒茅鬱森無跡可辨不但不孝泣血計窮二叟亦徬徨無措乃逐屋切訊冀一遇之越二日市人嚴世隆者見不孝驚顧相訊知其故歎曰小子君弟之友也太翁之葬予以力助焉地不在北而在東生前形容若何疾病若何棺木若何墓形若何土色若何葬後交趾内犯土人奔竄君弟抱病不知所終不孝亟起再拜同至東郊大江之左土地祠之右墓封若斧形不類土司之圓而鋭也墓内土色以鍬取視亦如其言遂慿葬師譚先生於四月初六日啟攅三日之内所需悉具移柩之辰大雨如注不孝黙祝曰雨若此何以舉事意者先靈不欲歸骸故鄉耶移刻忽大霽啟棺一如嚴言且殉衣顔色尚未損平日家居所常服也維時土官督備及與先人不孝一面之識者咸弔奠如禮為不孝加額嗟乎不孝之罪重矣阻絶廿餘年萬里窮裔遂克奉遺櫬以歸實先君之靈式慿之至若先生長者二三親知周旋翊掖不遺餘力甚至天涯未謀面殊服異俗之人翕爾同情不孝何脩䝉此不孝膚陋無文不諳紀述然仁人君子之用心不敢冺也謹摭始末書其槩云灌長氏曰觀生之貌殆文弱士也而意思深篤不忘其親初其往也鄉里悲其意而疑其事豈不以道險且逺歴時之久茫茫萬里在蠻荒中措手何從哉乃艱難百折而其事卒濟觀其成也蓋有天幸焉抑可謂難也已矣余讀其傳不忍没也有子若此雖逺遊可矣趙春盛籠水人父謨使酒無賴失其祖資好鬬鄉里畏之春盛甫冠即𨽻賊曹為健兒家貧不能治弓矢器具但以膂力時侮其同輩庚辰冬大饑萊蕪新泰間揭竿日起使者檄交下責賊曹不擒賊舊制賊曹本郡外兼制四邑各以健兒數十人赴賊曹習指揮後邑長率輕賊曹索餉多不應健兒無食往往亡去時賊曹主者為隴西李君别駕年已老得檄無措亟率騎數人步數人馳詣新泰合淄川騎五十人新泰土兵四百人别駕喜曰可破賊矣趣往新泰令與健兒長世竒諫不聽會使檄又下不亟往且得罪辛巳正月初六日出新泰四十里卒與賊遇賊約數千皆盤長矛往來呼躍亟發砲擊之中數人不却俄而四面驟至衆潰騎者皆馳别駕老不能馳遂墮春盛為步卒力戰已出圍返顧别駕墮復還攜之走未一里賊愈衆不能去道傍有短牆扶别駕上自與賊鬬刺十餘人死賊環攻之中數十創兩臂不能舉乃仆而死别駕亦遇害趙進美曰己夘春濟南陷萊蕪新泰盜羣起事定率悔解去賊曹天雄董君至萊蕪徐牖其魁斬之事平旋中考功法庚辰賊初合不過數十騎餘皆荷鋤夫耳若以兩郡兵殱之易易也乃相望不前而力驅數百鄉農與之戰豈遂以此為可勝抑猶冀賊之悔而自解耶濟則斥于文法不濟則身殉之又何賊曹之不幸乎春盛為予族弟年甫二十一而能力敵以死其長然則謂世無其人不可也竭閭閻以供戰士久矣一夫之烈豈足輕重而卒不多聞何哉此傳見清止閣集許經歴尚忠者初不識字十餘歳給事人家每見童子誦讀常竊聽之又好問時以手畫地作字數歳粗暁大意好濶談所如輙不合曰此不知我輙去之後事御史任公濬為書史初任巡按中州流氛大擾因病解歸越歳復起督師河南闖賊去來窺汴已三歳矣乃簡徒以行尚忠與焉前至長垣其軍中車騎材官持文書迎者皆至夜宿傳舎忽城中大噪城下賊適至舎中人悉起應之則前車騎材官盡賊也已入傳舎刼任以行從者皆散走尚忠獨從至順徳不降俱被縛去欲兵之尚忠在後呼曰死則死矣相公心放正者不可亂任被創悶絶復蘇賊乃緩之俱囚窄室中守者入夜少怠尚忠從中抽椽發屋欲縱主人去賊覺之未得行後持至京師賊敗乃俱歸順治中尚忠以倉塲從事年勞選授瓊州府經歴安撫山峒黎人又有勞効得其風俗要領以歸自記履歴道其事甚詳殊可聽風土歳時蟋蟀在堂好樂無荒昭唐俗之儉坎其擊缶宛丘之道知陳國之亡老人嬉戲纔如嬰兒識漢道之昌市有醉人以為上瑞兆李祚之替然則觀風問俗察其民氣雖甚細事亦得失之林治亂之跡也昔子貢觀于蜡而譏一國之人皆若狂孔子曰百日之蜡一日之澤賜也非爾所知也夫里閈之情通乎伏臘誰能違衆離俗自託于上古之世哉抑長慮却顧固不可不懷良士之思也聊述風土見人情焉立春日迎春于秋谷觴于范泉元夜以琉璃碗燈薦佛並散門庭又集峩嶺下作三日酺十六日女兒相將作小姑戲二月二日家家庭内以豆萁灰作廩圏謂宜五穀又作符置門上禁䖝蝎也十五日上塚添土令髙次日展謁寒食作水漿推飯經夏不餲日以凉水沃之却暑病解劬勞清明飯牛益一乾糒田家語曰打千罵萬清明一飯女兒家作鞦韆戲三月十五日四月十八日七月三日集顔文姜靈泉廟酬香愿四方畢至也端午挿艾葉以雄黄塗耳却䖝害也絲縷如故六月六日炒小麥作麫和蜜食之謂却熱除泄疾春雨杏花秋山紅葉處處登髙無須重九秋七月設祭顔娘墳並及翁姑其祝詞是顔娘語官為攝事綠情而設推孝之至此禮天下無也八月朔日未出取花上露洗眼謂去風熱益清明又濡墨㸃小兒腹疾猶雪白花紅靧面作華容也十月一日既滌塲蒭茭在野取之不問主人巫皷樂神十一月大盛臘八作粥投諸果餌食之匠人作屋雖復廣堂髙樓只一敷仰瓦不須重合歳久不漏他處效之輙漏也民間娶婦輙以甓一雙置門上娶婦納幣女家輙以筳箸納酒尊中謂十停九住作吉祥也喪家裝老不用綾紽綢縀止取絹綿謂綿者綿綿絹者眷也猶綣綣也執喪孤子無婦或無子婦主内治者間以治喪日省禮成合謂共更父母之喪同事異室于禮為權而傳曰縗麻非所以接弁冕也喪者相弔楮錠太豐雖貧家動損數百錢此禮恐難繼也喪家競作佛事道釋竟御箏絃或曰此亦天樂須有楞嚴經曰辟如琴瑟箜篌琵琶雖有妙音若無妙指終不能發故天王帝釋執持不廢也此雖微言終成戲論大家治喪邀人作棚塲結為樓閣雕牆髙者二三丈皆以布帛雜采為之照耀山谷此太侈不可久也春秋丁祭無官分獻諸生攝之主人召客席終遙見粉湯則客起爭門按范致明岳陽風土記湖湘間賓客燕集供魚清羮則衆皆退如中州之水飯也四月蠶熟槲葉長皆取葉裹粟米麫山花作角食八九月拾橡栗作粉食顔山雜記卷二
