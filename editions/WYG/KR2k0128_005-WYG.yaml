body:
  text: 跋孝鄉之於郡邑亦不數數也昔明嘉靖間鄉之耆舊馮海浮先生纂集郡志見稱於時萬厯中司空鍾公又取而附益之二公於世既為聞人其書號為巨麗而其於孝鄉頗為濶畧質諸所聞殆闕如也蓋孝鄉僻逺在郡邑二百里外二公生平既未嘗攬轡從容一覽其溪山省其風土而孝鄉之人又習為愿樸未嘗厚自雕飾取名譽而冐進於名賢作者之前此其没没近於無聞者也初王元美創置顔城而李于鱗為之碑記則雜引外事以作談鋒如妖女之祟九起之亂一切附麗文詞歸之孝水此或因所寄託用壯蔚其文筆為銘功紀徳之資則可要未得為衷言信史也至李中麓采掇流聞率爾命筆其為疏濶抑又甚焉試規于近事如史賊揭竿於萊野李孽肆踞於龍山謝遷播虐于淄川沂寇延蔓於長峪是皆亂氓蠭起近在門庭獨孝鄉之民中處其間按堵晏然無一人從亂者蓋其子弟之安於耕鑿習於教訓志定而難犯久矣此則元美氏之功為不没也家相國自昔家食每言及此喟然興歎嘗以謂君子一言之垂有風氣焉有法式焉有鑒戒焉故言不可以不慎也兹以謝政餘閒優遊在里常侍讌談於先光祿公每聞鄉中遺賢故老之行事退而察其習俗之變態乃綜括大端作顔山雜記四卷以付小子校錄之竊惟古者人物風土之書如三輔决錄西京雜記等篇並疎雅散朗畧存舊觀意到則書初無倫次似不在甲觀七畧之中而百世之下讀之者若親侍昔賢語笑而揖讓其間覽時變則慷慨傷懐撫山川則欣然欲徃昔漢武帝讀司馬相如大人賦飄飄有凌雲氣遊天地之間意亦文章之盛事也若聞詩而得興觀問禮而起莊敬則文章不足以槩之矣敬因校讐之次撫卷興懐附識所聞云爾康熙丙午秋七月男寶仍謹書
