body:
  text: 顔山雜記卷四祕書院大學士孫廷銓撰物産蓋民之為道本業不足然後有貨殖貨殖非古也不耕而食則長游惰不織而衣則生僣侈皆風俗之敝而仁義之䃣也然有異焉孝鄉山多田少而生齒日益繁生齒繁則食粟多山多田少則得粟難若是而不疾作也則饑甚故其民力力焉鑿山煮石履水蹈火數犯難而不息凡為饑驅也此雖不耕不織猶夫自食其力也顧燒琉璃者多目災掘山炭者遭壓溺造石礬者有喑疾炒丹鉛者畏內重縱謀而獲亦孔勞矣然則孝鄉之多藝也以其民貧也其無棄貨也以其土瘠也矧錐刀之幾何而强半在官中也是用瑣綴俾來者知其故焉石炭炭山灰也義從土然土得水而泥此不泥宜從石然石引火而不然此則然宜從薪木然木遇金而柔此不柔故一物而德具焉者炭為多凡炭之在山也辨死活死者胍近土而上浮其色䝉其臭平其火文以柔其用宜房闥圍罏活者胍夾石而潜行其色晶其臭辛其火武以剛其用以煆金治陶或謂之煤或謂之炭塊者謂之硔或謂之砟散無力也煉而堅之謂之礁頑于石重于金鐡緑焰而辛酷不可爇也以為礬謂之銅磧故礁出于炭而烈于炭磧棄于炭而寶于炭也凡胍炭者視其山石數石則行青石砂石則否察其土有黑苗測其石之層數避其沁水之潦因上以知下因逺以知近往而獲之為良工凡攻炭必有井幹焉雖深百尺而不撓已得炭然後旁行其隧視其炭之行髙者倍人薄者及身又薄及肩又薄及尻鑿者跂運者馳鑿者坐運者僂鑿者螬卧運者鱉行視其井之幹欲其確爾而堅也否則削入其隧欲其燥以平也否則趼凡井得炭而支行其行隧也如上山左者登右必降左者降右必登降者下墄登者上墄循山旁行而不得平一足髙一足下謂之仄墄胍正行而忽結磻石阻其前非曲鑿旁達不可以通謂之盤錮胍乍大乍細窠窠螺螺若或得之而驟竭謂之雞窩二者皆井病也凡行隧者前其手必燈而後入井則夜也燈則日也冬氣既藏燈則炎長夏氣强陽燈則閉光是故鑿井必兩行隧必雙令氣交通以達其陽攻堅致逺功不可量以為氣井之謂也鐡冶采石黑山鑄而為鐡百石之罏三合之屑火烈石礁風生地穴清氣如珠𤣥精為液得柔斯和過剛或折作為劒器蛟龍可截以鋼性易脆生不若熟也瓷器孝鄉之瓷出于山頭務店者碗鉢為多出于邀光者罐為多出于八陡者瓶罍為多出于西河者魚缸醯罋為多然皆疏土也夫物無美惡乘時為貴器無雕朴適用為宜故雲靁之鼎以之適野不若瓦缶之便也犧象之尊以之餉師不若陶匏之給也且物之美好者生民之大纍也孝鄉之瓷疏土也其用農􅡦也而不為貴也廢者亦幸不為賤者纍也今夫天之生物其為竒麗者一其為朴野者常百則不以一廢百也先民制器其為淫巧者一其為拙簌者且萬則不以一廢萬也何也生人之道始於飲食飲食天下之大欲也則飲食之器天下之大用也今夫農􅡦之為食脫粟麥飯也及其歡然一飽則脫粟麥飯固無以異于脯修羶薌也農􅡦之食之為器瓦缶陶匏也而及其屬饜則瓦缶陶匏固無以異于犧尊靁鼎也且農􅡦之食有其脫粟麥飯焉則間有其酒漿醯醬焉夫酒漿醯醬則非獨農􅡦之食也既富之家共此矣農􅡦之器有其瓦缶陶匏焉則又有其壺尊罋瓿焉夫壺尊罋瓿則非獨農􅡦之器也大貴之家又共此矣今舉富貴之家而進之以農􅡦之食如所謂脫粟麥飯者不屑也而至于酒漿醯醬不能絶也此固嚮者農􅡦之食也今舉富貴之家而奉之以農􅡦之器如所謂瓦缶陶匏者不屑也而至于壺尊罋瓿不能舍也此固嚮者農􅡦之器也孝鄉之瓷疏土也貧且賤者用之而富且貴者不能違聖人不貴異物賤用物以此也黃丹炒鉛為之丹重則鉛為丹鉛急則丹復為鉛炒多鉛氣中人令人中垂而死臨丹竈者必塞其鼻實其腹令中氣常勝鉛氣不能入也然後可久白礬白礬者夾炭石屑也取以為礬晶晶者氷皚皚者雪也當其為石墨墨者鐡也取而變之存乎冶也凡燒礬必即嶔巖之半削其髙以為壁斥其平以為臺壁斬斬臺板板也于其旁也塹土而堲周之以為池闕地及泉幹為井底為釡築之汚之旁通火焉以為灶布罋以為盝編荆而塗之以為廪其行火也移石就臺負壁而築之若連床之方焉陂陀其腳而微閷之烈火而焚之由內以攻外火盡取屑傅之又盡又傅之每盡傅之斬斬之壁則易以為髙也板板之臺則易以為廣也陂陀微閷以行水潦則行火者易以為養也故燒􅈨者久與巖齊雖雨三日而不浸火三月而不滅也乃取其燒以納于塹擊之汰之得其滋焉乃取其汰以納于灶熬之煎之流其液焉乃取其液以納于罋澄之凝之泛其屑焉體魄既成精魂未盈非硝不為功取而和之復納于灶火氣竭矣其精乃生取而漉之以納于廪水氣竭矣沈緊浮鬆外强中空鑿其􅌑瓏氷雪冲冲此􅈨之終也緑􅈨紅土緑􅈨者炭中銅磧也法如白􅈨減其工半精為緑􅈨滓為紅土按􅈨之初皆黑質而辛螫也及其變也或白或碧其滓則皆紅以染則碧復為黑其醮水又為黃蓋具五焉夫天下之臭味過差而善變者固若斯之亟也君子之用物也亦善其變哉淄石硯淄石坑在城北庵上村倒流河側千夫出水乃可以入西偏則硬東偏則薄惟中坑者堅潤而光映日視之金星滿體暗室不見者為最精大星者為下米元章曰淄石理滑易乏在建石之次蘇子瞻曰淄石號韞玉發墨而損筆端石非下嵓者宜筆而褪墨二者當安所去取用褪墨硯如騎鈍馬數步一鞭數字一磨不如騎騾用瓦硯也不知淄石顧有發墨而不損筆者惜二公之未見也琉璃琉璃者石以為質硝以和之礁以煆之銅鐡丹鉛以變之非石不成非硝不行非銅鐡丹鉛則不精三合然後生白如霜亷削而四方馬牙石也紫如英札札星星紫石也稜而多角其形似璞凌子石也白者以為幹也紫者以為軟也凌子者以為瑩也是故白以為幹則剛紫以為軟則斥之為薄而易張凌子以為瑩則鏡物有光硝柔火也以和內礁猛火也以攻外其始也石氣濁硝氣未澄必剝而爭故其火烟漲而黑徐惡盡矣性未和也火得紅徐性和矣精未融也火得青徐精融矣合同而化矣火得白故相火齊者以白為候其辨色也白五之紫一之凌子倍紫得水晶進其紫退其白去其凌子得正白白三之子一之凌子如紫加少銅及鐡屑焉得梅蕚紅白三之紫一之去其凌進其銅去其鐡得藍法如白焉鈎以銅磧得秋黃法如水晶鈎以畫碗石得映青法如白加鉛焉多多益善得牙白法如牙白加鐡焉得正黑法如水晶加銅焉得緑法如緑退其銅加少磧焉得鵝黃凡皆以焰硝之數為之程琉璃之貴者為青簾取彼水晶和以回青如箸斯條若水斯冰緯為幌薄傅于朱􅎉瑞烟徐起旭日始升影動几筵光浮御屏棲神象𤣥以合窈冥用之郊壇焉用之清廟焉𨽻于司空以稱國工其次為珮玉丁當連珠綴纓絳紗作盛辨冕盈廷乃球鏘鳴古者百僚朝祭之法服也其次為華燈屏風罐合果山皆穿珠之屬錯采雕龍口則無功其次為碁子風鈴念珠壺頂簪珥料方皆實之屬圍碁滴之風鈴範之料方亦如之條珠纒之細珠寫之大珠纒之戞之簪珥惟錯車磲者雜二色藥而糅之瑪瑙者琺琅㸃之纒絲者以藥夾絲待其融也引而旋之其次為泡燈魚瓶葫蘆硯滴佛眼軒轅鏡火珠響器鼓璫皆空之屬凡製琉璃必先以琉璃為管焉必有鐡杖剪刀焉非是弗工石之在冶渙然流離猶金之在鎔引而出之者杖之力也受之者管也授之以隙納氣而中空使口得為功管之力也乍出于火渙然流離就管矣未就口也急則流緩則凝旋而轉之授以風輪使不流不凝手之力也施氣焉壯則裂弱則偏調其氣而消息之氣行而㗋舌皆不知則大不裂小不偏口之力也吹圓毬者抗之吹膽瓶者墜之一俯一仰滿氣為圓微氣為長身如朽株首如鼗鼓項之力也引之使長裁之使短拗之使屈突之使髙抑之使凹剪刀之力也凡為葫蘆先得提後得腹接處為腰為含子葫蘆先得子次得提納子焉後得腹凡為魚瓶先得口次得腔次得山後得果枝凡為花簪先得莖後得頂斷而殊之易手而燎之後得蜂末凡為響器先得下口後得上口凡為硯滴先得頂口次得腹次得提後得吐水凡為燈碗先得圓毬吸其下按其上斷其臍而坐之上反為底下反為面凡為鼓璫先得葫蘆旋燒其底而四流之以均其薄欲平而不平使微杠焉以隨氣之動乃得鳴鼓璫者響葫蘆也言微氣鼓之而璫鳴也辟之為鼓也聲者其面也響之應者其腔也實則其空也故大空則大鳴小空則小鳴此老氏之說也當其無有有之用也凡為空者先養其氣氣圓而體圓此學書之說也心正則筆正也按通鑑唐代宗初誅元載召江西判官李泌入見語及載事曰朕面屬卿于路嗣恭而嗣恭取載意奏卿為䖍州别駕嗣恭初平嶺南獻琉璃盤徑九寸朕以為至寶及破載家得嗣恭所遺載琉璃盤徑尺俟其至當與卿議之胡三省注曰程大昌曰漢西域傳罽賓國有琥珀流離師古注曰魏略云大秦國出赤白黃黑青緑縹組紅紫十種流離此蓋自然之物采澤光潤踰于衆玉今俗所用皆消冶石汁加以衆藥灌而為之虛脆不耐實非真物按流離今書附玉旁為琉璃字師古之記是矣亦未得其詳也穆天子傳天子東征有采石之山凡好石之器于是出升山取采石鑄以成器注云采石文采之石也則鑄石為器古有之矣顔氏謂為自然之物恐不詳也北史大月氏傳魏太武時月氏人商販京師自云能鑄石為五色琉璃於是采曠石于山中即京師鑄之既成光澤乃美于西方來者自是琉璃遂賤用此言推之則雖西域琉璃亦用石鑄無自然生成者兼外國竒産中國未始無之獨不聞有所謂真琉璃然中國所鑄有與西域異者鑄之中國色甚光鮮而質則輕脆沃以熱酒隨手破裂其來自海舶者製差鈍朴而色亦微暗其可異者雖百沸湯注之與磁銀無異了不復動是名番琉璃也番琉璃之異于中國其别蓋如此而未嘗聞以石琢之也余謂路嗣恭所獻者蓋師古所謂大秦琉璃自然之物否則代宗何以謂之至寶哉程大昌考之不詳耳水磨柏香水之為利莫大于灌田是故近水者得天之半焉孝鄉田髙水下不可灌也頃有教以水車之法試而引之髙之上又有髙焉終不可灌也是失天之半矣幸可為水磨又獨能平輪不能為側輪也平輪者必為飛水以飛輪飛水者必髙其閘閘已庳則注水勢弱水雖大輪不飛也飛輪者必深其坎下其水而疾去之水平而去不疾則輪濡注水雖髙輪猶不飛也輪不飛則其戴石也力薄而功微是失水之半矣側輪者水擊其輞而力橫施可以磑可以舂也平輪者水擊其牙而力上行是不可舂徒磑耳是失磨之半矣髙其閘者必髙其堰堰已薄則沙易頽也已厚則力不償費也秋潦為患山水暴長堰之廢者非潦盡不可以復興而磨常半歲閒是磨之半又失半矣是故孝鄉之水磨常格于天時費于人力而不盡乎地利也灌長氏曰吾觀于鄉而知擇術之必慎擇業之必精也當明之末庚辰辛巳間江北旱災琉璃之家死者什九非以其無用器耶若其在時和清宴亦可以觀人情矣彼瓷炭用物也其行不越數百里丹􅈨赤土用舍半之其行千里琉璃無用器也然且北至燕南至百粵東至髙麗西至河外其行萬里彼物情之不齊亦獨何哉其用彌寡其行彌逺物暴齊故無虎也初余生長孝鄉山中四十餘年逮所傳聞又何啻百年鄉之人曾無故而談虎者齊其果無虎也齊有虎其自今以始也抑聞之昔者孔子嘗過泰山之側而歎苛政焉則是齊故有虎也前此有矣曷始乎此託始焉爾虎之為德既不若麒麟騶虞而為暴又甚于豺狼微鄉人惡之凡跂而角蹄而善走窟而善藏者彼其族也固未有樂虎者也傳曰一有一亡曰有今而履尾訴訴白晝攫人有一于斯矣君子危之而著其實則託始焉爾其託始也奈何春秋魯史也而魯齊近郊也多麋有蜮必謹而書之闕今虎之為暴其為麋蜮又多乎哉託始乎此蓋振振然其諸亦無樂乎此也西莊人闕上山刈葛忽聞蜂聲在近稍進窺之有虎負嵎蠅飛薨薨在其鬚目倉卒墜崖而免猶病瘧彌月嶺西村農民王朝臣因野猪害稼與其妻夜守瓜廬一日夜半朝臣忽欲出遺其妻心動止之不可甫撤扉出其妻遽聞有物仆地亟起視之夫已為虎攫去就田火追逐之遙見火光中有巨物徐行黑氣籠罩形不甚辨夫挺然赤露首足互著地蓬轉而行於後隨之衣已脫然在道帶結如故並未開解將次及之巨物隱不見夫殭死在草間坐守移時忽覺暗中出巨掌爪批其面頰顛于磧下惛然不復覺久之始蘇遂失夫所在王生家石馬莊佃客二人秋夜耦耕宿野棚下雨甚漏濕忽思笠子掛樹上可出取之一人出一人聞其顛仆聲有異怖不敢動天明視泥中有虎跡鳩衆尋求得其半體於七層堰上荒草間所著褲子委道旁繫有鐡舌鞓帶宛在褲間亦未解樂疃人孫氏家竪子於薄暮驅驢向鄰村駝水遇虎自投堰下石隙中虎至踞堰上凝睇注視以爪探之不及尺竪子伏不敢動瞪視良久虎亦不下其家怪竪子曛黑不來數人往迎之山路黑暗喧豗而行虎聞其聲乃舍竪子攫其驢去峩嶺巔文昌閣孤居無鄰近年一道士來居之一日昏暮出汲還閉户卧至日齊羣牧過其下怪閣門未啓呼之良久不應相與撼其門開有狼突出躍然而去道士殘矣壬午年兵自南來萊蕪已破鎮人倥偬方事城守余從衆在城角瞭臺覘者夜還報曰兵至矣青石關迤南迤北列營舉火似繁星矣衆方驚急有狼在城下對臺而號其聲百出斥之不去守者視之皆色土天未明大營果至卓旗東西兩山下瞰城中食頃拔去竟無他數年前鎮多狼孽傳說多異余家門外空園子栁下鑿井夜夜有羣狼來戲井上意憎之一夜比鄰劉美聲秀才家擾擾有聲甚可疑怪比曉使訊焉乃有狼夜入其家突于厨竈竈下人驚狼亦驚亟不得出皆譁不知所措適其日有莊客因事到官秀才援之得解尚未去聞故抽椽櫨遽入擊之應手而斃取其皮白澤可愛值數貫錢後亦無他或曰此自來送一品坐裀耳野獸無故入人家當為怪豈足信哉鎮無野猪近與虎偕來其為民害乃長於虎虎一而已野猪恃其豶牙率其種族以與鄉之人爭食此土也家苦之村苦之日夜苦之且孝鄉之民非有廣疇沃野可闢而耕也非有湖陂蓮勺稻粳魚藕之饒樂也終歲孑孑焉鑿嵁石闢柳椐得若席焉則田矣若几若箕焉則田矣山髙土淺水暵不收幸而至於秋也而黍離離而豆有萁率彼婦子夜守前溪少一不戒忽焉盡之豕則飽人則飢吏則呼閭則殫無遺矣禮祠八蠟祭虎為其食田豕也夫虎暴矣至使古人爼豆奉之以為功惟豕之故則謂其害長于虎也亦宜似鹿短小而肉角者曰麅麅即麋也多則害稼易取亦易馴性不耐夏每日止於早凉一起趂水食食已即擇䕃伏終日不起其首所向即其起行所向也獵人取麅常以清旦升髙瞭之前逐水食及還卧處皆已曉了又察其首所向即數百步外兩目閃閃於草際見之乃於前路設網左右設伏從後發蹤追逐十獲八九鎮西關李氏家嘗蓄一麅馴矣其家門外即山麅有時出暮必來歸屬當文廟秋祭例用鹿官督獵人急無所取為向李氏欲得此麅主人惜之不許麅亦如故祭有日矣獵人請之不已主人疑遲曰君且休矣餘當議之其日麅去遂不歸灌長氏曰萬物愚于人人愚于天顧人發殺機物或知之天發殺機人鮮知也彼死權死寵死於聲利即事理彰顯禍在燃眉尚謂彼人愛我迷而不悟者衆矣況幾先禍始動于萌蘖之間隔於視聽之表者乎嗚呼此麅智於臨江之麋多矣遺文道簡則貴物少則珍事約則精辭寡則要天之道物之情也夫登髙能賦則可以為大夫古之人猶且難之若前人所絶後人宜可無作乃在今日不啻燕函粵鏄夫人而能為之矣顧今人作之後人復用覆醬瓿終不如其無作也以顔城蕞爾僻在山陬上客輶軒通人羇旅載塗既稀遺篇自鮮間有殘碑斷碣埋沒荒榛拂拭鈔傳以存世變去其繁弱亦得雄篇也若此邦人士辟荆棘而居之讀書學古創始新邑間有綴述淵源未廣其為工拙存替以俟後之人故不槩録焉顔神鎮石城記濟南李攀龍撰公既以璽書按察青齊諸郡縣即青齊諸郡縣治也則之部請城籠水曰是淄萊新益之間一都㑹哉天不弔百姓一二長吏怠於疆事俾一二不逞子弟揭竿如林而負固自喜以為父母憂四方亡命嘯而過市有業甒於篚中覆之利劒莫敢以發而釋擔一呼為皆制挺又安可誰何百數十年來冀氏姚氏九為倡亂殺我一二長吏之戍者以荼毒我百姓焚蕩我廬舍􅉃不畏明至令一妖女子三勤我王師翦滅此而後食惡在其按察青齊諸郡縣為也余不佞蓋未嘗一日忘之桴鼓之鳴如出宇下即於璽書又得臨籠水以春秋耀吾軍士豈其防民而暴之中野必曰疆場之事一彼一此棄命廢職其若父老何我必不然不佞之業在蒸民之七章矣中丞傅公謂御史段公曰余觀於大夫才可使無徵役百姓而義不可使衆為政夫固謂一人慮始而榮施不可有也不然夫豈不知淄萊新益之間嗷嗷者以時絀為解也大夫實云畏此簡書即有後事安可言勿與知也曰昔在庚戌少司馬城潞水上乃天子有錫命此自大夫家政吾二人將有賴焉以干城王室備他盜也大夫實云無亦大夫按察青齊諸郡縣列城數十豈謂是西游津梁之上有急難也勿更使父老失望於我則公遂營焉曰是在不佞此一役耳何至言巨萬吾因石於山因灰於石雖隆之天不可勝用矣豈猶不堅而覆簣為之其又令暴風雨潦以攻一日之費石城非不倍委土而十年為計一再築之後石城之費立盡是使父老終歲率子弟而城已公乃屬之青州守李尚智倅倪雲鷴自三月至七月守尚智倅雲鷴乃以效於公算才官錢九百餘緡而城髙丈尋方廣若干丈各門焉二水門出南北城下因壑為池百姓忽自有之矣公以報成今中丞丁公也攀龍弱冠時一二長吏及彼中豪言城顔文姜事且三十年此無他則長吏過自好欲無受勞民傷財名不者大役難成恐中廢作者不任又不者如匪行邁謀與衆為政耳如此必使城自地出然後可百數十年來冀氏姚氏凡九倡亂一妖女子三勤王師亡論所蕩焚即芻餉供億豈但可為十城然遂以棄之乃平居則又不復作一錢事而曰吾已為儲芻餉供億於某所令足待變矣夫豈為計哉公名世貞字元美吳郡人少司馬名忬公其子云郡别駕魏公祠堂碑記郡人馮琦撰顔神之山盤紆而中裂水出文姜故址者繞其下厥土墳而埴宜陶陶者以千數青以西淄萊新益之間斯一都會也而於山近故亡命時有陶故鼓鑄四方貿易輻凑而不可法匪其不可法亡恩以用其法故也恩以用其法蓋昔者郡别駕河北魏公以之魏公之蒞兹鎮也五十年於此矣披翦草萊創建綱紀闓澤惠政未易縷指而及其得代之日鎮民擁道遮留塞乎轅轍之間車為之枳己而藉公弗獲則肖其貌祠之歲時伏臘必祀祀必䖍儼然如對公行而經其宇下者低回不能去也農者曰是嘗勸課我緩我租商賈者曰嚮者無擾於吾市其嘗有犯於公者曰是真我公也猶有惻惻矜憐之色焉至是而疇昔之壯者老老者寖以物故祠亦日圯乃相與聚而謀新之以請於守道盛公盛公曰吾志也吾將表其治以風於東國於是捐糈鳩工順民欲而經始焉逾月落成堂故兩楹拓而四之故無廡左右翼之公是時蓋衛武抑戒之年矣仍如其彊仕時廟之制從新貌從舊志思也祠於范文正公之側明埒也而揆公與文正吾必以公為難何也當孤鎮於專城當草創於坐理當倅於守霄壤矣而民之祠之也同公何啻難乎昔晉太保王休徵氏之佐州也民歌之曰海沂之康實賴王祥邦國不空别駕之功夫以海沂重地安危繫一别駕而所指以為别駕功者在國不空耳公視政事三年垂槖以歸積羡金四百置公署作經費推此志也寧復有剝民膏血以困此小大東者耶自太保而後至始興世始大啓吾以為公之淳德清節似太保而公之冡𦙍中丞公似始興也公凡三子皆以制科為聞人長公子復七人並以文學顯以比于江左諸王若合符矣嗟乎天之報善人也以子孫民之報廉吏而祀之也如其子孫世乃有謂亷吏可為而不可為者則何也公名怡號節齊中丞公名允貞號見泉同與百姓建是祠者則本鎮通判五臺張君藴道關中趙君存誠也法得並書又碑郡人鍾羽正撰吾郡顔神鎮故有别駕魏公生祠與范文正公並民思魏公德祠所以報也祠比於范公者其德埒也公去鎮蓋五十餘祀而民思之若新當事者更拓地為堂三楹兩廡翼之修葺以時垂於有永藩臬羣公屬余為記余考今昔吏治隆汙之際則慨然以嘆而逺想先輩長者之風夫其奉職無擇官拊循其民無擇地精心一意而無所為於其間故感人深而流風逺余蓋聞於故老稱說魏公之所為顔神者一何豈弟淳至也顔神蒼孤萬山篳路藍縷以啓之苫蓋荆棘以居之魏公以别駕來蒞於兹其為置散無異公即不鄙夷之治官如家訓飭其民如其子弟農有勸蠶織有賞弭盜有法其大指乃在教訓安利之無取赫赫治辦者久之而民乃大和訟息于庭民安于孰老稚嬉于野而公雅潔修一絲不以自溷得代之日羡金四百置之而去蕭然空槖而已大略魏公之治如古循吏所勉𥪡而不自功公之節如古亷吏所檢飭而不自名其去顔神也萬人號留車枳而不得發家繪公像飲食必祝也其祠宇之存者日飾月闢五十祀而若新是何修何營哉别駕之卑顔神之僻宜賢者之所弗樂而公且以為畏壘桐鄉此公之所以為長者也世蓋有矯厲能稱職者矣或其官與地足以階榮藉聲者也然刻飾塗澤真意不偕而味亦不淵永其資與地無所復冀則不漁其民以身為壑已稱為賢者矣何暇論於尸祝之間哉余故樂道公事而為之記非獨致景行也且欲以風世焉正為公伯子中丞公所薦士中丞公清忠沉毅有古大臣之節仲子又余同年相善季子刑部公亦名士蓋公積慶之澤將滿宇內祠不以重公也抑以繫邦人之思云爾山雨樓圖記退谷孫承澤撰山雨樓圖者枚先太宰圖其讀書之樓也太宰家青之顔神鎮海岱諸山蜿蜒而來結聚於此林麓娟秀溪流回合大江以北所未有也太宰久宦長安思歸未得乃繪而為圖髙樓矗起巋然其中樓無不宜而曰山雨者海氣挾雨滃然東來四顧如畫集于一樓其最勝景也每公餘退食焚香展卷宛如登臨其上而載歌載詠也往時大司空劉清惠好樓居而未能搆文衡山作層樓圖以贈之至今傳焉近年于姜黨先生思其鄉之山水某宜亭某宜閣某宜橋梁繪為意先卷彼時士紳羡而題之今太宰之卷圖耶樓耶要不必問而其意則逺矣居嚴重之地事務鞅掌議論煩雜人所斂眉棘手者獨處之以靜正整暇具于是卷見之矣余嘗言古之能辦天下事者皆如不欲辦者也故車書玉帛兵陳會盟紛紜勞攘而意境蕭然有山林空寂之氣故足貴也太宰有之矣其樓之為圖圖之為樓舉足慕也題山雨樓卷詩鎮州梁清標曾展沚園秋色圖又看樓閣倚芳湖細栁隂隂垂野岸凉風翦翦行菰蒲霜橋楓浦遙映帶山禽晨夕如相呼斯樓搆自何年始四時風物尚書里尚書雅望裴王儔門庭清寂心如水身依日月志岩扉家山繪入丹青裏虛敞髙樓天半開當窗逺岫何崔巍冥濛海氣溪雲合蕭颯天風山雨來山雨滿樓秋氣爽飛流瀑布山泉響主人髙吟秋水篇客來時蕩蘭舟槳尚書退食寶此圖開襟示我同披賞尺幅宛移濠濮間卧遊如立東山上漠漠亭臺入翠微賜沭山公許暫歸白雲紅葉迎孤棹茒堂沙徑生清暉畫樓無恙烟霞護如君家慶真難遇兩親老傍鹿門棲鳯毛蚤擅凌雲賦舒嘯幽篁明月低稱觴絲管行雲駐三徑雖髙元亮風九重雅重曲江度中朝人物待持衡未容逸興盟鷗鷺久客余懷亦倦遊百尺思卧元龍樓嵗月蹉跎歸未得凄霜苦雨胡逼仄浩蕩秋風起太行三復此圖興歎息題沚園秋望卷詩安邱劉正宗京洛厭塵氛勝情易索寞邈焉曠土懷尺幅存寄託淹見孝水涯秋色㸃寥廓卜築俯川原帶山復近郭登陟富緑隂瀠洄湛清壑雙峯峙白雲長虹飲嵐腳几席分潺湲逺從天際落柿葉敵霜楓白石沃粲若豈必羡濠梁自足知魚樂頓覺人境遙嵗月失炎熇棲尋匪外求位置嗤丹雘乃知地無偏幽竒在領略誰信啓事餘清興儕猿寉披圖恣卧遊烟巒歸臆度何日負行笈短屐與同著又題駢邑馮溥羣峯環緑野松菊盡堪圖水碧烟嵐接沙明鴈鶩呼巖從秋樹老風入夜弦孤帝切嘉謨念無疑是鑑湖栁色參差處溪流帶小橋石牀醒酒易竹徑借風饒露下香沾屐朝來黛㸃椒何時扶病過未惜馬蹄遙謝公多逸興小築水之濱靜得川原適清無市井塵霞鮮遮日壁松種長龍鱗魚鳥歡情性忘機傍主人相期尋舊約山徑久曽經此日三公圃他年二老亭月明環水白雲散見峯青誰唱滄浪曲悠悠最可聽附録十三經注疏序洛書出而文字立文字立而經乃伊始矣自尼山記政教得失易詩書禮樂春秋並列為六司馬遷因之稱曰六藝班史無譏焉又以五學配五常而論語孝經并記六藝略中若漆園氏述孔子西藏書周室翻十二經以說老聃則一以為六經六緯一以為易上下經十翼一以為春秋十二公經也周續之通十經則五經五緯也唐甲部經録其類十一則易詩書禮樂春秋孝經論語䜟緯經解小學也其明經取士之九經則禮記春秋左傳為大經詩周禮儀禮為中經易尚書春秋公榖為小經宋合三傳舍儀禮而以易詩書周禮禮記春秋為六經又以孟子論語孝經為三小經則宋所稱九經也若夫石室十三經始自孟蜀蓋上翼五經若繁星配斗而下比小學䜟緯諸篇則又江淮河洛之俯視夫弦蒲具區貕養餘祁矣且夫漢儒之為功於經也烈矣自秦火熄挾書令除然三代舊篇淹沒淪喪髙堂北平顔芝伏勝后蒼費直毛萇向歆父子孔安國之徒口授筆録網羅放失發冢壁之藏編煨燼之跡逮東京魏晉馬融鄭𤣥服䖍王弼何休趙岐王肅杜預郭璞范寧鄭衆諸賢咸考詳異同辨正得失鑽厲遺言窮年白首迄乎六朝雲擾南北中分章句好尚互有偏執南人簡約得其精華北學深蕪窮其枝葉以至正義辨於貞觀二禮詳於永徽端拱咸平復加較正經傳注疏始成全帙蓋桃弧棘矢篳路藍縷以唘山林莫喻其勞而典章名物草木鳥獸字析句比雖繅人治絲針人治組天官之九野三垣建章之千門萬户莫喻其詳且密也而士茍志在稽古正學則舍此何適焉然學士或白首不見全書即辟雍之籍蠧老塵封齊受誦讀卒業者闕焉又或僞謬相衍抵牾不保讀之如含瓦石毛生兹刻獨為完善于以羽翼聖經有功於王者表章之事者也且此書之聚訟亦從來多故矣十翼後先象彖分合孰是孰非孔壁伏書古今何辨豳何别乎雅頌衛邶鄘何分關雎盛衰安昉冬官何闕考工何補職方禹服山川曷據王制月令漢儒何以附㑹夏時周月正朔焉憑膏盲墨守廢疾之論三傳優劣胡為紛紛以至詩之有齊魯韓內外易之有施孟梁丘京氏書之有歐陽大小夏侯禮之有大小戴春秋之有吳助何存者什一亡者什九疑信廢興斯編具在昔人云聖人之經昭若日月而先儒又謂六經注我我注六經夫以人心自有之六經而窺乎日月我注注我正復不隔誠好學深思以探其意又安在漢人窮經而經亡哉故曰六經載道之文能觀聖人作經之意知為儒者希天之業也嗚呼深逺矣漢博士以五經待詔每國有大政大疑則各以所名一經奏斷而朝廷稱制决焉雋京兆處衛太子事雖復引義不精而猶能援古决疑倉卒定變况其果能以禹貢治河以春秋折獄以三百篇當諫書以周禮致太平以論語半部佐定天下者哉則其窮經致用執此以往有不可勝用者矣嗟乎毛氏一經之功臣也漢有二毛其苗裔乃能合十三經而日星之其亦可謂淹雅綜勤有志表章豈特為海虞稽古正學之一人哉此邑先生任尚書濬按吳時所作也尚書與余同在山間村墅相按竒才博識文章凌轢秦漢曩嘗共事司農每有劇談愧其綜雅今其既沒遺文散亡家人竟無存録良可惜也此文雖有毛刻行世其間雕印僞誤頗多聊為校勘附載於此以示鄉之來學慨自古樂之亡後生小子虛憍寡昧其於經史源流曚然莫辨才拾坊牘餘瀋鈔録成行輒已傲然自題名士安知前輩作者用意若此之勤乎顔山雜記卷四
