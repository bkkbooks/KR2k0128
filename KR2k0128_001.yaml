body:
  text: 顔山雜記卷一祕書院大學士孫廷銓撰山谷蓋泰岱之隂連山二百里斷而復起然後有長白故圖經曰長白岱之北輔也其二百里間山大如長白者多有圖經皆無專名明乎皆泰岱之支麓義不得有專名也辟言地大者雖復千里一以州舉之此其義也雖然山大矣民衆矣同在山中莫適名也則言不順於是乎地從主人或以方或以物或以人或以水泉草木各意贈之辟猶遺賢在野鄉人得私諡焉此其義也孝鄉之山北望長白東連郡郭其大者宜從郡不從鄉然郡于岱遠鄉于岱近其自岱來者先從鄉後從郡矣蓋環城而近有南之峨嵋焉東之荆阜焉西之鳯嶺焉北之鴿崖虎山焉自岱來望顔城而先入與萊人共之者有嶺西之禹峯土門西之樵嶺關下之甕口嶺焉自岱來趨長白而去欲去不去延佇於淄青之界者有峪口之雙山臺南之入子寨焉自岱來循萊蕪谷而東去復折而西以啓峩嶺之秀者有東南之嶽陽黑山焉郡志失其什九山中之人間日補綴凡其自效於兹鄉者皆得録而存之以示後之居是鄉者得考其略焉峩嶺峩嶺者峩嵋也峩嵋也者蛾眉也山形秀曲如眉之臨目也北來者十里間遙見四山髙寒一峯隱秀樓閣三成在青蒼煙靄中峩嶺上文昌祠也在城南關鳯皇嶺其山南接樵嶺北連西崖迢迢不極一峯回注北翔而南折如鳯鳥之矯翼然山半有玉皇宫石樓古木時出清鐘遙對長河岸栁淺浦沙汀歷歷行人間間魚鳥最為幽絶在峩嶺西南隔水對峙玉皇宫宋刻四聖御押右一押泐闕四代皇帝御書押字謹命工再模刻于石朝夕瞻禮上答聖恩宣和乙巳重六月神霄玉清宫賜紫道士闕宋碑肖蓬瀛亭記乘鸞跨鶴神仙之勝遊瀛海蓬萊洲島之絶境世之人喜道神仙中事然不過傳記所載聞而知之者耳顔泉山水之富冠絶淄境巖居川觀蓋千餘家而居民之東幽谷有泉晝夜混混盈而不竭是為二女衆泉合流穿雲透石潺潺焉瀉出于兩山之間是為東溪山山之隂支分𣲖引不假疏導灌溉蔬圃五六十區是為平流平流之側張君道源别業在焉南際谷口東接水涯鑿池匯泉植蓮養魚洲渚其中甃以巨石搆亭其上橋梁固而鯨背髙畫舫回而漣渚碧極目周視煙嵐四圍憑檻俯觀花木叢蘙隨所矚寓皆足以滌塵襟而爽心目故能使人暫到忘歸每來終日勝地若斯豈數見於人間世哉克肖蓬瀛信非虛語其始鑿池余嘗為賦詩今亭既成復屬余為記夫惟處市㕓而有林泉之志厭俗囂而思物外之遊自非性識明達宇量夷曠孰能與此道源其庶幾乎大觀己丑季秋五日新秦臺理曹椽李桓記元碑天之理一耳氣之運行亦一耳故心外無天天外無道舍心而求天舍天而求道猶適越而北轅其謬甚矣自漢武立通天之臺候神之館承露之盤雖為覬福而設亦未聞廟而奉天帝也唐明皇祖老聃始宫太清于亳邑宋真宗奉天書始宫玉清昭應于汴都又諸宫觀或置使以領之亦有宰輔而兼祠職者而徽宗以天子之尊而加教主道君之號時琳宫之在天下奚啻萬區而三清老氏之祠無處無之淄郡南鄙一舍許有山名峩嶺籠水出焉峯巒秀麗為諸山冠宋大觀己丑有賢而隱居黃冠曰張道源者樂是山之岑蔚像玉皇而宫之松竹亭沼之勝蔬果魚鱉之饒絶迹塵外以俟世路清平闕爾道源既死宫亦闕灰靖康之亂迄聖朝延祐于今百祀無慮六七作至泰定初年摧敝又有甚焉鄉耆胡深王福凡二十輩鳩金僝工圯而復營於是神路有門靈官有堂百年朽敝復為偉觀茍無此新將遂瓦礫荆榛而已爾其如摩天蒼檜何是宜碑之以作義氣前鄉貢進士東洋李源撰新授臨江路新淦州蒙古學教授胡從善書益都路益都縣典史張益都路益都縣顔神鎮巡檢時進義校尉益都路益都縣主簿周承務郎益都路益都縣尹管諸軍鄂囉勸農事喬汝楫將仕郎益都路益都縣達嚕噶齊兼管諸軍鄂囉勸農事呼圖克特穆爾至正二年歲次丙子二月日虎山虎趵崖虎者武也當鎮城之北方以填水口謂玄武也有玄帝之宫焉又山雖小而作意大有力如虎也趵踴躍也英山鵓鴿崖削崖臨水棲鳥起于壁間與虎山夾處以助其力焉東阜即荆山麓也下臨秋谷上有盤石廣平俗謂范文正公讀書臺猶虎丘千人石也以僻處也隱而無名在城東偏黑山環城諸山多青石此獨黑取而煉之一石石得二斗鐵孝鄉之釡鬵鎡犁是取資焉郡志謂言林木蔽虧常如晦暝聞之不詳也在峩嶺東十五里甕口嶺自土門道至青石關二十里兩山夾溪崖壁峻竦巖樹交參單車徐引數步一息時則秋泉鳴于空峽谷鳥弄于隂林夕日層隂徘徊屢顧誠樵隱之槃居羈塗之逸駕矣參政四明陳沂詩萬嶺千山一道分向空盤磴歷青雲丹楓黃菊爭秋色白石蒼崖共夕曛長劒倚峯當面立淨琴流水傍車聞秦關蜀棧無踰此絶險真穿虎豹羣副使吳郡王世貞詩千秋此夾谷駐馬意徘徊蒼嶺峯爭向青天線劃開人疑懸索度水憶建瓴來回首兵車地虛生命世才里人孫寶侗甕口道歌甕口道中溪谷黑青石關下萬石塞馬踏石稜盤空行俯身北下愁傾側前山回合路欲無夾岸髙峯向人逼有時疊嶂如連城白日蔽虧生暝色秋髙萬樹紛紫翠黑者露潤垂秋實山鳥不鳴秋已深猛虎髙卧夜留迹長弓在背箭在腰蠶叢自奮千夫力憶昔左車誇井陘宋武大峴快所經道左馬陵伏神弩天畔壺關擁地形又見此地設天險九州則壤分徐青周家青社胙茅土山隂則齊陽則魯伐齊曾記哀公年艾陵一戰雄千古先克博邑後克嬴此地川岩映赤羽當年南北阻巖關夾谷臺髙孝水滸聖代一統亭障空青濟分疆開二府白羊水落羣山髙天末秋風吹錦袍騰逃山鬼奔蒼鼠無限寒光照寶刀禹山去城西十五里為王大嶺四望層巒起伏渺渺如連波孤峯桀立萬山之表時有雲氣浮浮帶其蒼岫雨則先起晴則後散城中之雨候也樵嶺登團山而南望重岡合沓灌木塞塗是樵嶺也其下開敞小有田居樵屋依岩三三兩兩中多白石晴沙氿泉側瀨交影青林之下炎陽朱夏失其酷暑樵嶺泉也今懸崖有洞去地百尺猿引而上容數百人土人避兵處也在城西南十里八子寨北為深谷西為門東南皆巉岩不可以上對谷有人家茅屋銜山半裂石間有洞在巖際不可梯攀中多夜明砂土人歲一取之縋崖而入在城西十里石馬山黃紅峪在城南三十里趙進美黃紅峪記并詩村居日已踰亭午客有談黃紅峪之勝者率爾命蹇過墟落阡陌數里陟山麓山率磅爭竒無所容不可往至峪則岩盡立林木皆俯忽有邃壑逶迤而開者秋潦之所出也人因以通焉竒石笏列既往即攀援以登未里許導者邀豫遵左岩之足猿引以上豫恃掖者掖者恃蔓葛影皆遙懸至一洞仰視其户猶在百尺巔登者手口膝足皆倚於石如將入焉所倚各相附始徐移其一不可上下視不知所至惟聽于石踞洞而望重山蒼然危岑傾岫異勢而同賞古巖對峙雜木森拔時見一二人出沒鳥巢枯葉間風畟畟不止良久而下復循峪以入山愈迫石愈瘦而壯細流亹亹鏘然鳴答巖半有小泉甚湛洌落苔蘚中散流若無遊者至此忽自見其影在石上乃共嘆悵焉初至第三潭潭淺而澄寒石相依寂寞幽潔若為冬意所束又百餘步則第二潭皆氷矣石氣互映不可辨氷上有枯樹痕徑枝頽幹皆如畫復進則石之或植或卧咸丈餘錯􅑇相承初謂徑且窮既數踰之衣袂冷冷有聲受吾趾者皆若奔雲積雪目力所聚惟蒼寒肅肅而已初潭淵瑩秀徹石環之以鑑其古貌嵯峩參差大者箕踞小者旁睨而以潭也則意益孤勢益嚴致益冷而潭亦因石以成其靜峪至此且盡巖既合而怒起數百丈老藤盤蜒空遊異木交蔭夏秋間來石上者不見星日瀑布乘巖首而垂飛沫四濺潭上之石皆不可坐卧潦水既收潭石皆定人始得近狎之而猶凛然憭栗神凄息斂若無依也峪既窈窕幽窅層障阻蔽暝色冉冉方自衆山來而遂已先暮潭石清寂出其光潔並以照人歸者如行淡月中忘吾勞焉嚴冬方凛冽緒風沐寒疇空林依積雪寂寞發竒遊暝色入鴻濛岩靜清潭幽微雲翼孤峯素石鳴潛流絶壁無晦明日夕蒼煙留嵐氣何處滅時見歸鳥投隂壑雷雨古山光草木收苔潔含晨氷返照披暮丘衆岑相波濤渺如漾輕舟西阜當禹石門外之巖崖也孫廷鐸清明飲西阜詩天亦愛時節風恬物自清以君臨水意動我看山情野圃垂新栁春城上舊鶯蕭辰多勝事隨意一班荆壺觴雜坐卧徙倚晚煙生自覺憐同調誰能惜宿酲席邊芳草合眼底李花明不有石門唱那知物外情水泉青州之水載在禹貢曰海若淄若濰若汶南汶若濟旁見於傳乘曰澠廣於水經曰汶北汶若膠若巨洋皆川水也禹堙洪水除災害疏貢道則已非是不書蓋舉其大而細者可略也大禹既沒陵谷變移尋經脈水時有抵牾故桑欽又詳之蓋舉其細而大者可按也海納百川川納衆流一勺之多亦歸溟渤匪是則河海無以成其大故酈道元水經注剔山窮谷録及涓泉野渚渟潭悉歸掌故蓋舉其纎而細者可盡也若又其隱者泉生階戺清瀨時聞潤起雲根秋泓乍瀉事已微矣非其土著孰記潛源聊舉昔人所遺復綴於此非其境者雖近不録焉大洪泉又名白雲泉在鳯嶺之陽阿巉岩壘疊相承如版幹怒濤裂石而出水竇處可濶八尺髙六七寸傾岩爭吐石淙懸注下激深潭驚湍急峽恍忽動搖每清秋霽夕緣溪洄溯雪浪飛寒覺微風扇於蘋末臨石徙倚如霧露沾人雖去之若遙砰雷之聲猶自在耳按黃河之下吕梁謂之洪言其驚急而盛大也郡乘訛為打閧或又從而實之鄙俚無文失其趣矣趙進美白雲泉詩猶借危岑勢獨宜幽者聞色侵寒石淨聲自亂雲分晴動蒼蘿徑秋生白鷺羣壺觴莫早返留看月紛紛竒雲吐潔岫逺似此泉光但在溪聲內同分山氣涼風煙接瀲灔城郭入青蒼前浦孤峯下森森魚鳥鄉藥王泉出大洪泉下白石硠砢荇芹蒙密吹浪翻瀾汩汩四出以上承洪泉之頽波不辨其際但覺水面至此乃突而髙洪水有涸此泉不絶白羊河出西山流入甕口道亂流齒齒數里行積石中水南有巨石臨倚方廣若三間屋亭亭如波上立下則晴沙散雪吹影鏤紋夕陽微射時覩沙面如縱筆竒書恍恍無定悉天然二寸魚與石旁木葉秋花相映時則稱此石為釣魚臺其水東去又入石澗中壁門斗絶無復寸土束隘爭鳴落石潭中曰黑石之灣又北帶麓泉水以入孝水也麓泉出黑石灣下河東岸側孝泉出大洪泉百步外顔文薑祠下深源靜閟滙為清池深可丈餘浮泡泛珠吹沙湧起澄淨寒徹不掩針芒藻翻荇搖皆可辨數其上虛簷翠柏負日髙寒臨斯池也靡不倚檻徘徊蠲煩易慮者矣水出祠外與大洪泉水合徑踐積石悉成湍瀨峩嶺之陽諸山泉水左注之鷺立鳬投小有渟瀦乃行峽中石梁起於絶壑闌干橫帶兩山過梁支離泉栁林泉水右注之北流徑西寺閣前黃石起於山根輕湍為之洄注至鎮城西北范河口范水左注之又北沙溝山水右注之又北出於兩山之間是為虎山矣其水半瀦深陂半流石上又東北後峪諸山泉水左注之又屈曲西北石臼河水右注之又北至般陽與般水會趙進美孝泉詩逶迤近桑梓觸事皆可悅矧兹曉山淨復對寒泉潔寥寥廣殿虛肅肅涼風發弱荇搖中池素濤散成雪石壁瀉微雲鳥聲弄清樾倚欄蕩塵纓顧影傷短髮十年困奔走望逺意飛越何當耕溪濱放歌甘薇蕨惆悵石橋古樹涼天涯行李豈能忘已知山意多秋雨自聽泉聲到夕陽支離泉出鳯山峽口本沙泉細水而枯旱不竭昔有道士劉支離呪此水有竒異立碣書符於泉上石迹猶存今移於山上玉清宫其詳不可得聞栁林泉出支離泉下菀栁繁隂可枕可漱二女泉出城南峩嶺之北麓東西有二泉東泉清深珠而不藻西泉淵閟藻而不珠泉南舊有二女堂今四角石礎猶存蓋聞昔有二女閔其父母老獨無兒遂乃共誓不嫁投身淨門以資供養泉上是其出家之處惜其碣石湮滅事迹難詳其曰龍泉曰珍珠泉者皆後人之所目也夫畫龍不靈照乘非寶忍沒獨行成斯淺義因緣乖格未謂愜然泉上今為龍泉寺桐柏蘙鬱香臺間靜以近山也鳥聲多而人迹少時聞僧伽讃揚清𣑽值秋髙氣徹則萬柿垂紅於金字丹魚吹碧於淨池此焉棲息亦為勝因水出寺北流徑趙御史班璽園亭至於城下半入水門半落隍中西流北折同入范河以歸孝水也趙進美疏泉記龍泉水入南城而支焉又繞西城外城中西南人皆臨水而居日得一人合城中西南人其得不計矣今歲旱泉不能出日失一人合城中西南人其失不計矣合城中西南人而出之或一人或一日或數人或數日耳其得又不計矣塞既久泉必他溢若大雨泉不能出然能沒也彼時出之其失又不計矣衆計必能知此崇禎十一年五月二十八日余姪世榮實倡利濬之舉亹亹新流長幼沛悅爰刻同言以識始作孫廷銓過趙侍御園亭詩我屋青岩側君園碧水潯蒼茫連一徑蕭摵寄遙心泉落山皆響門深栁自隂坐來幽興愜聽遍應時禽小築非時就孤亭羡此安人家分水石吾土富林巒病覺抽簮好官虞避地難終當茅結屋渾似此中看范泉出東阜范文正公祠堂下祠前臨秋谷澗道回合舊富喬木其泉流入澗繞樹穿林木葉泉聲瀟瀟響答文正微時讀書處也按文正父為淄青記室客死文正少孤育於長山朱氏因名朱説嘗讀書長白山醴泉寺斷虀畫粥刻苦勵志及登第乃易姓名故其表曰入境遂稱張祿乘舟偶效陶朱以秋谷之接迹長白實為勝地伏讀棲尋其有由然近居人於此谷上逺駕石梁平通山腳接引泉水遂乃於梁上跨谷分流每尋梁憩集虛谷來風青岩阻日弄溪光拾澗藻石梁上下南澗北流東泉西逝月淨波明宛成十字濠梁之性樂以忘還其水徑乎城中與二女泉合其支流之不上石梁者循山旁注徑趙濟美涼洞亭南落入於澗皆於城北會為范河以歸孝水也分署通判平定和清遊范泉詩龍泉之東秋谷口瀉出寒流潄瓊玖誰種長松緑蔽天繫雲兩岸垂楊栁涼透襟裾暑氣微范老藏修歲時久雲間片石讀書臺籃輿直上荆山陡平看翠壁夾長川鳥鳴不見紅塵走相逢月色滿山堂況有清人載斗酒岡南岡北盡桃林問花開後還開否待得春歸約再來尋真肯負攀枝手恣遊何處問髙風千載古人吾尚友孫廷銓初春賊退後偶過范泉詩晴嵋猶照石牀書樹杪危欄晚眺餘石引泉聲成宛轉雪殘山意上清虛條風微欲迎玄鳥弱荇春來聚白魚斗酒相呼頻未厭近時憂樂倍躊躇趙進美同題風日今晨定山煙盡作春艱難郭外意珍重亂餘身溪色分晴逺城寒借栁新清吟同倚杖幽磬更依人又歲暮飲家岐叔秋谷園亭樹暗溪聲繞山明日氣銜雲霞寒入座氷雪靜依巖謝客烏皮几長歌白木鑱薜蘿春欲發三徑莫全芟又别墅作效晚唐十里嵐光煙後新蕭蕭灌木照溪濱青鞋短杖尋山志白石寒泉隱士身斷續蟬聲草閣雨髙低驢背板橋人北窗栁色風吹入薄暮雲歸滿四鄰雙泉觀音泉沙泉皆出范泉南秋谷中北與范水合馬君祠泉張一泉皆出西山旱溢無時夏秋水漲則粼粼成川同為沙溝河以達孝水孫廷銓晚秋過馬君祠詩孤村人境外煙火負巖居茅屋圖堪倣霜林錦不如峯回看路誤木落識天虛日夕狂歌起依稀是接輿小圃深藏壑危峯欲造天刈葵千樹露蒸棗一林煙山勢連愚谷溪流似冷泉翻愁車馬過蘿徑最髙懸務子泉倒流河梁莊泉皆出東山合流徑彼岸寺南入於孝水按後峪村彼岸院金世宗大定四年敕建有尚書禮部牒文刻石院中餘文剝蝕不可辨讀矣其寺後枕山阿前臨溪水平泉深栁可以植蓮菱泛鳬鷺為勝觀也按水經注隴水南出長城中舊注當作瀧水瀧有雙籠二音東北流至般陽縣故城西南與般水會水出縣東南龍山俗亦謂之為左阜水西北徑其城南王莽之濟南亭也應劭曰縣在般水之陽縣資名焉其水又南屈西入瀧水北徑其縣西北流至萌水口萌水出西南甲山東北徑萌山西東北入于瀧瀧水又西北至梁鄒東南與魚子溝水合水南出長白山東抑泉口山即陳仲子夫妻之所隱也孟子曰仲子齊國之世家兄戴祿萬鍾仲子非而不食避兄離母家于於陵即此處也其水又徑於陵縣故城西王莽之於陸也世祖建武十五年更封則鄉侯侯霸為侯國其水北流注于瀧水瀧水即古袁水也故京相璠曰濟南梁鄒縣有袁水者也瀧水又西北徑梁鄒縣故城南又北屈徑其城西漢髙祖六年封武虎為侯國其水北注濟其城之東北又有時水西北注焉青州府志古孝水一名籠水今孝婦河也北注般陽般水入焉又北徑長山縣西又北徑新城縣西又北入于小清河抵髙苑博興樂安又東北髙家港入于海小清河即濟水之支津也城市官署緣起余行萬里而歎人事之治亂靡常地氣之盛衰有故也或都邑而廢為丘墟或鄉聚而蔚為奧府其將興也賢必衆多其將廢也俗必先壞不可不察也孝鄉于古雖無專城然其郊于齊魯則大國也錯于淄青則雄州也南接泰嶽其山鬱儀以嵯峨猶岱畎也孝水洋洋潤數百里卒放乎清河以達滄海猶濟澨也古者巷有人亭有長到今傳之有賢則名地不在大矣有明隆萬以前孝鄉為青州巡道之治府巖關巨防阻三面以制十八城亦形勢之宗也一女煽亂三勤王師變起蒲臺禍延長峪鎮之驚豈鎮之孽哉世宗之世名賢作鎮繕我城隍綏我父老管絃俎豆以安經鋤百餘年間彬彬乎興於禮讓文學矣巡檢司宋以上無考今按顔文薑靈泉廟金皇統元年碑載淄川縣顔神店巡檢徐闕庵上村白雲觀元至元二十七年碑載益都縣顔神巡檢馬受則巡檢一官自金元已有凡歷五百年至今因之也撫按行臺𢎞治八年山東撫按以顔神鎮為地方要害建立行臺一所常川巡行駐節按察分司正德五年添設青州道兵備僉事一員往來駐劄每歲在鎮闕個月建城以後地方無事巡道常川駐府城非有公事不至鎮城矣青州府通判分署正德十二年巡按御史黃某奏請下兵部議覆看得顔神鎮南至萊蕪縣兩山夾立接連新泰蒙隂山嶺北鄰淄川長山孝婦河水拖繞地勢險要山川環抱軍民雜處多有以強欺弱以衆暴寡又兼各縣挾分土分民之私以致羣盜借出此入彼之險題奉欽依添設青州府捕盜通判一員在鎮專管防禦兼轄新淄長萊等縣地方有警即調遣兵馬聽其約束萬厯二十年本廳通判劉芬桂上請兩院奏準頒給關防一顆崇禎十二年朝有裁府廳添練備之舉部議將本廳衙門裁革鄉官兵部尚書仇維禎等具呈廳官萬不可裁兩院奏準復舊附𨽻人正德十二年兵部題準設通判遂奉撥青州道團操快壯五百餘名在鎮操演防守取食於淄新萊壽髙蒙六縣載入各縣賦役全書後因承平日久各縣災傷陸續裁減尚存快壯一百六十名至順治五年盡裁去萬厯四十八年嶧縣蓮賊作亂本鎮通判李延芳請添兵防禦準撥青州營兵一百員名又召募新兵一百名益都縣設處工食在鎮鎮守事平始撒按本廳設官以來其有政績生祠者南樂魏怡祠在秋谷范公亭後關中趙存誠祠在鳯皇頂上關中李延芳祠在顔文薑靈泉廟旁桐城齊登輔祠在永濟大橋東畔附設官議三則一廳屬兼轄四邑不當改去按濟南李攀龍顔城碑記四方亡命嘯而過市百數十年冀氏姚氏九為倡亂以毒我百姓蕩我廬舍至令一妖女子三勤王師兵部設官議云各縣挾分土分民之私以致羣盜借出此入彼之險是往昔顔山之亂非必土人之為之實四方逋逃不可究詰之為之也四邑既歸疆索百年遂靖萑苻效可覩矣一旦謂區區郡倅無事此穰穰者為遽削而去是嚮其利乃忘其功去其害又辭其費本末輕重未深權也一團操快壯不當全罷無事而養土兵與有事而調客兵利害孰多計眉睫者必曰客兵便事至而集事平而罷費不加長兵不加募也故客兵便懷逺算者必曰土兵便安其田廬習其險易釁不外生民不內擾也故土兵便試就前事權此二議彼亂者九起王師三勤計其為費必不減於五百團操民快之口食明矣一通判既專城本鎮不當頻數視篆他邑是官之設既號賊曹非望以焦頭爛額為功將借以建威消萌為重況鎮城之衆視下邑不啻倍之鄰山逼近去縣復遙穰穰待命纍月無官鄉之人即欲親鄰善俗不煩雀角其如越境暴客輕肆狗偷何顧其才者既樂親繁劇之事不耐端居其賢者即欲以雅俗坐鎮為心難違上指豈寧鎮人望治之情恐亦非初議設官之意也石城嘉靖三十六年本鎮舉人趙敬簡等議本鎮雖有捕盜通判一員出入無僚佐可屬進退無城池可守誠所謂獨坐窮山放虎自衛者也請建石城保安地方兵備道副使王世貞據以上請巡撫都御史傅頤巡按御史段顧言行青州府知府李尚智本廳通判倪雲鷴諸城知縣李永康臨淄知縣衛心親詣本鎮率耆儒鄉民踏勘卜吉督工建城閲三月而告竣周五百丈門四南曰龍泉北曰范河東曰荆山西曰禹石水門三一偏龍泉而西一偏禹石而北一偏范河而東崇禎間添作瞭臺八小水門一當荆山門下南受二女泉水入城分為二一沿城腳而西入于文廟泮池出徑石橋又北徑府館折而西出西水門一北流至于隅首又分為二一沿西街而西至石橋與泮水合一北流徑東隅首出北水門東受范水西流至于隅首與二女泉水合府館在城西街文廟在其南行臺在其東城隍廟在南門內義學在北街此城中之大略也城西之民夾禹石門而西至于隅首有橫街北出郭門而近南出郭門而逺東負郭稍南負峩岩西枕孝河是為大街大街北出亂河而西起于西寺之崖陂陀而下北至于疊道西負崖東枕孝河為西冶言琉璃之罏冶也其民多業琉璃大街南出過山峽石橋山房髙下環泉而居炊煙三接水石間之北負峩岩西依鳯山之麓南望黑石之灣為神頭城東之民夾荆山門而東南負峩岩北枕范河抵澗道折而南至于雙泉為秋谷口城南之民傍峩嶺之阿屈曲斜連以逐龍泉之分流為南道城北之民起于范河橋北跨大河之伏流又北倚于灘東連荆阜抵于石洞為北關北嶺其民多業瓷窑河灘之西起于疊道北至于沙溝為稅務司街其民多販瓷器此附郭居民之大略也山東按察使司副使分巡青州道太倉王世貞碑銘世貞不佞既已城顔神則諸父老走李先生文記之而李先生雅善余故於文稱稍過非當不佞中丞公侍御公之教也與二三大夫士之謀也余惡敢雍容而坐顓之余不佞又惡敢雍容而顓諸父老之力以為己功諸父老從子弟蒿萊其畝日夜胼胝將事矣即因材於山髙下陂陀減省他費十之八九而寧無一二酒漿飯炊之費以勤諸父老二三大夫士瓜分版築杖馬箠而人䇿之亦既勞止篳路藍縷以啓兹城拮據忉忉實唯二三大夫士與諸父老共其何不佞之有不佞則竊復隱虞焉為諸父老城顔神者城之已耶將縣之也城之而前使者以萬計囁嚅旁喝迄靡敢動今不旋踵而告成事諸父老業已受賦二百里外不勝其煩附庸即百雉之崇易易若是規而縣之則可縣之將為若置令若丞蝟役毛供齕人於袵席間哉而割三邑之膏壤使其民與諸父老並削而敝策大左不取也語云見已事不能見將然即令今決城縣利害與他日身所受本末岐異矣然未可箸數而舌析姑以明余志耳余不佞敢遂籍二三大夫士暨諸父老子弟姓名系之碑隂而傳以銘銘曰顔薑之山厥陽瀉鹵夾谷造天綰轂其口萊新西控淄益東走五民居之匪利南畝作為竒袤即山而取盜鑄椎埋韋跗帓首矛鈐日尋何戎不莽唯余睅目靡富靡穀本之不探而末是矚厲我父老以勤版築剃野罄室壺簞道屬唯兹父老藩屏是篤石城峩峩可以礪鏃危岡冠領腴泉滋腹在易有言設險守邦衛以武師周以崇墉遏軋亂萌毋使蔓張母若安之薄征厚藏刃鎩鈎喙枉矢大槍銷為鋤耰趣而農桑比屋興讓遵彼周行牧臣罪言敢告職方李攀龍青州府志序顔神可城而不可規為縣以官具則民匱而險不為用也灌長氏曰吾聞諸父老城之始卜也其繇曰城不過百年當盛又百年而衰兹溯厥生初蓋盛已久矣明之衰也災祲相仍九州雲擾通都望郡凋落多矣而此鄉獨完今又二十年而百堵皆作察其生聚似又過焉夫此石田非加闢也為者非加疾也君子甚禍無故之利而惜望外之福彼佌佌有屋䔩䔩有穀其謂此何哉夫賈人子徒見微利醉飽侈淫驟獲而驕不顧其後固細人之情也觀子弟者視其父兄觀齊民者視其鄉大夫以謂教行自上也救敝之道寧為朴無為豪寧為願無為薄即衰可持盛可蓄也凡我鄉大夫共慎此哉顔山雜記卷一
